services:
  insecure-service:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "8090:8090"
    # Per-student flag: python3 ../../instructor/seed_flags.py env <STUDENT_ID> > .env
    environment:
      - FLAG_DEVSECOPS
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- INSECURE service on :8090 — GET /admin fails OPEN — see worksheet.md ---' &&
               python insecure_service.py"

  secure-service:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "8091:8091"
    # Per-student flag: python3 ../../instructor/seed_flags.py env <STUDENT_ID> > .env
    environment:
      - FLAG_DEVSECOPS
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- SECURE service on :8091 — GET /admin fails CLOSED + logs ---' &&
               python secure_service.py"
