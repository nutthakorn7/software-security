<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Quiz — Play</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div id="join-area">
    <h1>Join a quiz</h1>
    <input id="pin-input" placeholder="Game PIN" maxlength="6">
    <input id="nickname-input" placeholder="Nickname (not your real name)">
    <button id="join-btn">Join</button>
    <div id="join-error"></div>
  </div>
  <div id="game-area" style="display:none">
    <div id="question-area"></div>
    <div id="feedback-area"></div>
    <div id="leaderboard-area"></div>
  </div>
  <script src="/static/player.js"></script>
</body>
</html>
