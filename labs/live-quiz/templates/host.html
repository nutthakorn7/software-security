<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live Quiz — Host</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  {% if not created_pin %}
    <h1>Start a quiz</h1>
    <form method="post" action="/host/create">
      <select name="topic">
        {% for t in topics %}
          <option value="{{ t }}">{{ t }}</option>
        {% endfor %}
      </select>
      <button type="submit">Create game</button>
    </form>
  {% else %}
    <h1>PIN: <span id="pin">{{ created_pin }}</span></h1>
    <div id="waiting">Waiting for players to join at this device's address...</div>
    <button id="next-btn">Next question</button>
    <div id="question-area"></div>
    <div id="results-area"></div>
    <a id="export-link" href="/host/{{ created_pin }}/export">Download results (CSV)</a>
    <script src="/static/host.js"></script>
    <script>initHost("{{ created_pin }}");</script>
  {% endif %}
</body>
</html>
