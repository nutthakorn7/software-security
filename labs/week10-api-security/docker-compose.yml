services:
  vulnerable-api:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "8080:5000"
    # Per-student flags: python3 ../../instructor/seed_flags.py env <STUDENT_ID> > .env
    environment:
      - FLAG_BOLA
      - FLAG_MASSASSIGN
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- INSECURE API on :8080 — see attack.md ---' &&
               python vulnerable_api.py"

  solution-api:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "8081:5001"
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- SECURE API on :8081 ---' &&
               python solution_api.py"
