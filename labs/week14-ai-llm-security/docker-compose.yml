services:
  vulnerable-chatbot:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "6000:6000"
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- INSECURE chatbot on :6000 — open http://localhost:6000 — see attack.md ---' &&
               python vulnerable_chatbot.py"

  guarded-chatbot:
    image: python:3.12-slim
    working_dir: /lab
    volumes:
      - ./:/lab
    ports:
      - "6001:6001"
    command: >
      bash -c "pip install --no-cache-dir flask &&
               echo '--- GUARDED chatbot on :6001 — open http://localhost:6001 ---' &&
               python guarded_chatbot.py"
